services:
  # BitFlyer 트레이더 (trading-engine, EXCHANGE=bitflyer)
  # ⚠️ 2026-04-14 운영 중단 — 재기동 시 restart: unless-stopped 으로 변경
  bitflyer-trader:
    build:
      context: ..
      dockerfile: trading-engine/Dockerfile
      target: production
    container_name: bitflyer-trader
    ports:
      - "127.0.0.1:8001:8001"
    environment:
      - EXCHANGE=bitflyer
      - PORT=8001
      - LOG_LEVEL=info
      - TZ=Asia/Tokyo
      - DATABASE_URL=postgresql+asyncpg://trader:trader_password_123@trader-postgres:5432/trader_db
    env_file:
      - .env
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8001", "--log-level", "info"]
    volumes:
      - ./logs/bitflyer:/app/logs
      - ./core:/app/core
      - ./adapters:/app/adapters
      - ./api:/app/api
      - ./main.py:/app/main.py
    restart: "no"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - trader-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# PostgreSQL + trader-network는 coinmarket-data/docker-compose.yml에서 관리.
# 기동 순서: coinmarket-data → trading-engine
# cd coinmarket-data  && docker-compose up -d
# cd trading-engine   && docker-compose up -d

  # GMO FX 트레이더 (trading-engine, EXCHANGE=gmofx)
  # ⚠️ 2026-04-14 운영 중단 — 재기동 시 restart: unless-stopped 으로 변경
  gmofx-trader:
    build:
      context: ..
      dockerfile: trading-engine/Dockerfile
      target: production
    container_name: gmofx-trader
    ports:
      - "127.0.0.1:8003:8003"
    environment:
      - EXCHANGE=gmofx
      - PORT=8003
      - LOG_LEVEL=info
      - TZ=Asia/Tokyo
      - DATABASE_URL=postgresql+asyncpg://trader:trader_password_123@trader-postgres:5432/trader_db
