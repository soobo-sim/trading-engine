name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install -e ".[dev]"

      - name: Run tests
        run: |
          .venv/bin/python -m pytest tests/ -m "not requires_api_key" \
            --tb=short -q \
            --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml
